name: OWASP Dependency-Check

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Cloner le repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Installer Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Installer OWASP Dependency-Check CLI
      - name: Install Dependency-Check CLI
        run: |
          curl -LO https://github.com/jeremylong/DependencyCheck/releases/download/v8.3.1/dependency-check-8.3.1-release.zip
          unzip -q dependency-check-8.3.1-release.zip -d dependency-check
          chmod +x dependency-check/dependency-check/bin/dependency-check.sh

      # 4️⃣ Lancer l’analyse
      - name: Run OWASP Dependency-Check
        run: |
          dependency-check/dependency-check/bin/dependency-check.sh \
            --project "projet9" \
            --scan . \
            --format HTML \
            --out dependency-report

      # 5️⃣ Sauvegarder le rapport comme artifact
      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report/dependency-check-report.html

